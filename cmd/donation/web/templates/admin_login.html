<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin login</title>
  <link rel="stylesheet" href="{{assetPath "base.css"}}">
  <link rel="stylesheet" href="{{assetPath "admin.css"}}">
</head>
<body>
  {{template "site_nav" .}}
  <main class="center-shell">
    <section class="admin-auth-panel">
      <p class="eyebrow">Admin</p>
      <h1>Sign in</h1>
      <p class="bio">Request a one-time sign-in link for the configured admin email.</p>

      {{if .Error}}
        <p class="form-alert error">{{.Error}}</p>
      {{end}}
      {{if .Notice}}
        <p class="form-alert notice">{{.Notice}}</p>
      {{end}}

      <form class="admin-auth-form" method="post" action="/admin/login">
        <input type="hidden" name="_csrf" value="{{.CSRFToken}}">
        <label class="field">
          <span>Email</span>
          <input name="email" type="email" autocomplete="email" value="{{.Email}}" required>
        </label>

        <button class="primary-button" type="submit">Email sign-in link</button>
      </form>
    </section>
  </main>
  {{template "site_footer" .}}
</body>
</html>
